version: 2
builds:
  - main: ./cmd/amadeus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "amadeus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: voska
      name: homebrew-tap
    name: amadeus
    homepage: "https://github.com/voska/amadeus-cli"
    description: "CLI for Amadeus travel APIs"
    install: |
      bin.install "amadeus"
